<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b1020">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QR Scan Pro">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.svg">
    <title>Web Mobile QR Scan Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --app-height: 100svh;
            --info-height: clamp(280px, 42dvh, 360px);
            --overlap: 30px; /* Độ đè lên của info-section */
        }

        @supports (height: 100dvh) {
            :root {
                --app-height: 100dvh;
                --info-height: clamp(280px, 42dvh, 380px);
            }
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overscroll-behavior-y: none;
            overscroll-behavior-x: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #000;
            position: fixed;
            inset: 0;
            min-height: var(--app-height);
            height: var(--app-height);
            touch-action: manipulation;
        }

        /* Animation quét QR: 2.5s */
        @keyframes scan {
            0%, 100% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(220px); opacity: 1; }
        }
        .scan-anim {
            animation: scan 2.5s ease-in-out infinite;
        }

        #camera-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Chiều cao bằng toàn màn hình trừ đi phần info không đè */
            height: calc(var(--app-height) - var(--info-height) + var(--overlap));
            z-index: 1;
        }

        #info-section {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--info-height);
            max-height: 52dvh;
            background: white;
            border-top-left-radius: 2.5rem;
            border-top-right-radius: 2.5rem;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.4);
            z-index: 10;
            display: flex;
            flex-direction: column;
            overscroll-behavior: contain;
        }

        .ios-scroll-lock {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .action-bar {
            padding: 0.5rem;
            padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem);
            background: white;
        }

        .btn-shadow {
            box-shadow: 0 10px 20px -5px rgba(161, 27, 75, 0.4);
        }

        @media (max-height: 700px) {
            :root {
                --info-height: clamp(250px, 45dvh, 320px);
            }

            #info-section {
                border-top-left-radius: 2rem;
                border-top-right-radius: 2rem;
            }
        }
    </style>
</head>
<body class="relative">

    <div id="camera-section" class="bg-slate-900 overflow-hidden">
        <img src="https://images.unsplash.com/photo-1580582932707-520aed937b7b?q=80&w=1000&auto=format&fit=crop"
             class="w-full h-full object-cover opacity-60">

        <div class="relative z-20 flex justify-between items-center px-6" style="padding-top: calc(env(safe-area-inset-top) + 1rem);">
            <button class="w-10 h-10 rounded-full bg-black/40 text-white backdrop-blur-md flex items-center justify-center border border-white/10">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="flex flex-col items-center">
                <h1 class="text-white font-extrabold text-lg tracking-[0.2em] drop-shadow-lg">CHECK OUT</h1>
                <span class="text-emerald-400 text-[10px] font-bold tracking-widest animate-pulse">● LIVE CAMERA</span>
            </div>
            <button onclick="toggleModal()" class="w-10 h-10 rounded-full bg-black/40 text-white backdrop-blur-md flex items-center justify-center border border-white/10">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>

        <div class="absolute inset-0 flex items-center justify-center pb-20">
            <div class="relative w-60 h-60">
                <div class="absolute -top-1 -left-1 w-12 h-12 border-t-4 border-l-4 border-emerald-500 rounded-tl-3xl"></div>
                <div class="absolute -top-1 -right-1 w-12 h-12 border-t-4 border-r-4 border-emerald-500 rounded-tr-3xl"></div>
                <div class="absolute -bottom-1 -left-1 w-12 h-12 border-b-4 border-l-4 border-emerald-500 rounded-bl-3xl"></div>
                <div class="absolute -bottom-1 -right-1 w-12 h-12 border-b-4 border-r-4 border-emerald-500 rounded-br-3xl"></div>

                <div class="scan-anim absolute top-2 left-4 right-4 h-1 bg-emerald-400 shadow-[0_0_20px_#10b981]"></div>
            </div>
        </div>
    </div>

    <div id="info-section">
        <div class="h-1.5 w-32 bg-gray-100 mx-auto mt-3 rounded-full overflow-hidden">
            <div class="h-full bg-emerald-500 animate-[shrink_0.5s_linear_infinite]" style="width: 100%;"></div>
        </div>
        <style> @keyframes shrink { from { width: 100%; } to { width: 0%; } } </style>

        <div class="p-3 ios-scroll-lock">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-extrabold text-2xl shadow-lg shadow-emerald-100">
                    Đ
                </div>
                <div class="flex-grow">
                    <h2 class="text-2xl font-extrabold text-gray-900 leading-tight">QUÝ ĐỨC</h2>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter">Mã: 11001</span>
                        <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                        <span class="text-xs font-bold text-emerald-600 uppercase">Thành công</span>
                    </div>
                </div>
            </div>

            <div class="mt-6 space-y-2">
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-400 font-medium tracking-tight">Phụ huynh:</span>
                    <span class="text-gray-800 font-bold">Nguyễn Đăng Thu Hà</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-400 font-medium tracking-tight">Thời gian ra:</span>
                    <span class="text-emerald-600 font-black text-lg">14:21:38</span>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="flex gap-3">
                <button class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl text-xs tracking-widest active:scale-95 transition-transform">
                    STOP
                </button>
                <button class="flex-[2.5] py-4 bg-[#A11B4B] text-white font-black rounded-2xl text-xs tracking-[0.15em] uppercase btn-shadow active:scale-95 transition-all">
                    QUÉT TIẾP
                </button>
            </div>
        </div>
    </div>

    <div id="settingModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center px-6 bg-black/70 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl transition-all">
            <h3 class="text-xl font-extrabold mb-8 text-gray-900 border-b pb-4">CẤU HÌNH</h3>
            <div class="space-y-6">
                <div class="flex justify-between items-center font-bold text-sm">
                    <span class="text-gray-600">Tự động quét tiếp</span>
                    <div class="w-12 h-6 bg-emerald-500 rounded-full relative p-1 cursor-pointer">
                        <div class="absolute right-1 w-4 h-4 bg-white rounded-full"></div>
                    </div>
                </div>
                <div class="flex justify-between items-center font-bold text-sm text-gray-400">
                    <span>Âm thanh (Beep)</span>
                    <div class="w-12 h-6 bg-gray-200 rounded-full relative p-1 cursor-pointer">
                        <div class="absolute left-1 w-4 h-4 bg-white rounded-full"></div>
                    </div>
                </div>
            </div>
            <button onclick="toggleModal()" class="w-full mt-10 py-4 bg-gray-900 text-white font-bold rounded-2xl tracking-widest">XÁC NHẬN</button>
        </div>
    </div>

    <script>
        function toggleModal() {
            const modal = document.getElementById('settingModal');
            modal.classList.toggle('hidden');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const buildVersion = '1.0.8';
                alert(`Da tai code moi. Build: ${buildVersion}`);

                navigator.serviceWorker.register('./sw.js').catch(() => {
                    // Silent catch: app should still work without PWA features.
                });
            });
        } else {
            window.addEventListener('load', () => {
                const buildVersion = '1.0.8';
                alert(`Da tai code moi. Build: ${buildVersion}`);
            });
        }

        let touchStartY = 0;
        document.addEventListener('touchstart', (event) => {
            if (event.touches && event.touches.length > 0) {
                touchStartY = event.touches[0].clientY;
            }
        }, { passive: false });

        document.addEventListener('touchmove', (event) => {
            const scrollable = event.target.closest('.ios-scroll-lock');

            if (!scrollable) {
                event.preventDefault();
                return;
            }

            const touchY = event.touches[0].clientY;
            const pullingDown = touchY > touchStartY;
            const atTop = scrollable.scrollTop <= 0;
            const atBottom = scrollable.scrollTop + scrollable.clientHeight >= scrollable.scrollHeight - 1;

            if ((atTop && pullingDown) || (atBottom && !pullingDown)) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
